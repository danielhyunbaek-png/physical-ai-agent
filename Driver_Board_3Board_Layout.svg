<svg viewBox="0 0 1240 880" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#555"/></marker>
    <marker id="arrG" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#7A4FB0"/></marker>
  </defs>

  <rect x="0" y="0" width="1240" height="880" fill="#FFFFFF"/>

  <!-- title -->
  <text x="60" y="40" font-size="22" font-weight="700" fill="#1A1A1A">FULL DRIVER BOARD — 3 PERFBOARDS, 4+4+3 (one line of 11 cells)</text>
  <text x="60" y="62" font-size="13" fill="#666">88 channels = 11 cells (1× 74HC595 + 1× ULN2803A each). 84 used (ch 0–83), 4 spare. ~4 cells/board = comfortable fit on 10×15 cm. Build &amp; test each board, then bridge the 2 seams.</text>

  <!-- Mega + PSU feed box (left) -->
  <rect x="60" y="80" width="372" height="92" rx="6" fill="#F4F7FB" stroke="#C4D3E6"/>
  <text x="72" y="98" font-size="12" font-weight="700" fill="#234">ARDUINO MEGA + 12V PSU  →  feed Board A (left edge)</text>
  <g font-size="11" fill="#333">
    <text x="72" y="116">D11 → 595 #1 DS (blue)　　D12 → SH_CP rail (green)</text>
    <text x="72" y="132">D13 → ST_CP rail (white)　Mega GND → GND ★ (black)</text>
    <text x="72" y="148">+5V → +5V rail (red)　　　PSU +12V → +12V rail (orange)</text>
    <text x="72" y="164">PSU GND → GND ★ (one star point with Mega GND)</text>
  </g>

  <!-- Seam jumpers box (right) -->
  <rect x="820" y="80" width="360" height="92" rx="6" fill="#FBF5EE" stroke="#E6C9A8"/>
  <text x="832" y="98" font-size="12" font-weight="700" fill="#7a4a12">EACH SEAM (×2) — 6 jumpers, board → board</text>
  <g font-size="11" fill="#333">
    <text x="832" y="116">1 +5V　2 SH_CP　3 ST_CP　4 GND (solid)</text>
    <text x="832" y="132">5 +12V (heavy / doubled wire)</text>
    <text x="832" y="148">6 DS cascade: prev 595 Q7′(9) → next 595 DS(14)</text>
    <text x="832" y="164" font-style="italic" fill="#7a4a12">Bridge each seam LAST, after both boards test good.</text>
  </g>

  <!-- BOARDS -->
  <rect x="60" y="190" width="350" height="378" rx="6" fill="#FCFCFA" stroke="#CFCFCF"/>
  <rect x="445" y="190" width="350" height="378" rx="6" fill="#FCFCFA" stroke="#CFCFCF"/>
  <rect x="830" y="190" width="350" height="378" rx="6" fill="#FCFCFA" stroke="#CFCFCF"/>
  <text x="70" y="208" font-size="12" font-weight="700" fill="#555">BOARD A — cells 1–4 (ch 0–31)</text>
  <text x="455" y="208" font-size="12" font-weight="700" fill="#555">BOARD B — cells 5–8 (ch 32–63)</text>
  <text x="840" y="208" font-size="12" font-weight="700" fill="#555">BOARD C — cells 9–11 (ch 64–87)</text>

  <!-- seam strips -->
  <rect x="410" y="190" width="35" height="378" fill="#FBEFE0"/>
  <rect x="795" y="190" width="35" height="378" fill="#FBEFE0"/>
  <text x="427" y="560" font-size="10" fill="#B07a2a" text-anchor="middle" transform="rotate(-90 427 560)">SEAM 1</text>
  <text x="812" y="560" font-size="10" fill="#B07a2a" text-anchor="middle" transform="rotate(-90 812 560)">SEAM 2</text>

  <!-- RAILS (three segments each + dashed seam jumpers) -->
  <!-- +5V -->
  <line x1="70" y1="230" x2="400" y2="230" stroke="#E03B3B" stroke-width="3"/>
  <line x1="455" y1="230" x2="785" y2="230" stroke="#E03B3B" stroke-width="3"/>
  <line x1="840" y1="230" x2="1170" y2="230" stroke="#E03B3B" stroke-width="3"/>
  <text x="70" y="224" font-size="10" font-weight="700" fill="#E03B3B">+5V</text>
  <!-- SH_CP -->
  <line x1="70" y1="322" x2="400" y2="322" stroke="#2EA84F" stroke-width="3"/>
  <line x1="455" y1="322" x2="785" y2="322" stroke="#2EA84F" stroke-width="3"/>
  <line x1="840" y1="322" x2="1170" y2="322" stroke="#2EA84F" stroke-width="3"/>
  <text x="70" y="317" font-size="10" font-weight="700" fill="#2EA84F">SH_CP</text>
  <!-- ST_CP -->
  <line x1="70" y1="347" x2="400" y2="347" stroke="#BBBBBB" stroke-width="3"/>
  <line x1="455" y1="347" x2="785" y2="347" stroke="#BBBBBB" stroke-width="3"/>
  <line x1="840" y1="347" x2="1170" y2="347" stroke="#BBBBBB" stroke-width="3"/>
  <text x="70" y="342" font-size="10" font-weight="700" fill="#888">ST_CP</text>
  <!-- GND -->
  <line x1="70" y1="384" x2="400" y2="384" stroke="#2A2A2A" stroke-width="4"/>
  <line x1="455" y1="384" x2="785" y2="384" stroke="#2A2A2A" stroke-width="4"/>
  <line x1="840" y1="384" x2="1170" y2="384" stroke="#2A2A2A" stroke-width="4"/>
  <text x="70" y="378" font-size="10" font-weight="700" fill="#2A2A2A">GND ★</text>
  <!-- +12V -->
  <line x1="70" y1="488" x2="400" y2="488" stroke="#F08A24" stroke-width="5"/>
  <line x1="455" y1="488" x2="785" y2="488" stroke="#F08A24" stroke-width="5"/>
  <line x1="840" y1="488" x2="1170" y2="488" stroke="#F08A24" stroke-width="5"/>
  <text x="70" y="482" font-size="10" font-weight="700" fill="#D9760F">+12V</text>

  <!-- seam rail jumpers (dashed) -->
  <g stroke-dasharray="4 3">
    <line x1="400" y1="230" x2="455" y2="230" stroke="#E03B3B" stroke-width="3"/>
    <line x1="400" y1="322" x2="455" y2="322" stroke="#2EA84F" stroke-width="3"/>
    <line x1="400" y1="347" x2="455" y2="347" stroke="#BBBBBB" stroke-width="3"/>
    <line x1="400" y1="384" x2="455" y2="384" stroke="#2A2A2A" stroke-width="4"/>
    <line x1="400" y1="488" x2="455" y2="488" stroke="#F08A24" stroke-width="5"/>
    <line x1="785" y1="230" x2="840" y2="230" stroke="#E03B3B" stroke-width="3"/>
    <line x1="785" y1="322" x2="840" y2="322" stroke="#2EA84F" stroke-width="3"/>
    <line x1="785" y1="347" x2="840" y2="347" stroke="#BBBBBB" stroke-width="3"/>
    <line x1="785" y1="384" x2="840" y2="384" stroke="#2A2A2A" stroke-width="4"/>
    <line x1="785" y1="488" x2="840" y2="488" stroke="#F08A24" stroke-width="5"/>
  </g>

  <!-- 595 ROW -->
  <g font-size="11" fill="#2A2A2A" text-anchor="middle">
    <rect x="80" y="245" width="60" height="44" rx="4" fill="#E7EEF7" stroke="#7E97B8"/><text x="110" y="272">595 #1</text>
    <rect x="162" y="245" width="60" height="44" rx="4" fill="#E7EEF7" stroke="#7E97B8"/><text x="192" y="272">595 #2</text>
    <rect x="244" y="245" width="60" height="44" rx="4" fill="#E7EEF7" stroke="#7E97B8"/><text x="274" y="272">595 #3</text>
    <rect x="326" y="245" width="60" height="44" rx="4" fill="#E7EEF7" stroke="#7E97B8"/><text x="356" y="272">595 #4</text>
    <rect x="465" y="245" width="60" height="44" rx="4" fill="#E7EEF7" stroke="#7E97B8"/><text x="495" y="272">595 #5</text>
    <rect x="547" y="245" width="60" height="44" rx="4" fill="#E7EEF7" stroke="#7E97B8"/><text x="577" y="272">595 #6</text>
    <rect x="629" y="245" width="60" height="44" rx="4" fill="#E7EEF7" stroke="#7E97B8"/><text x="659" y="272">595 #7</text>
    <rect x="711" y="245" width="60" height="44" rx="4" fill="#E7EEF7" stroke="#7E97B8"/><text x="741" y="272">595 #8</text>
    <rect x="850" y="245" width="60" height="44" rx="4" fill="#E7EEF7" stroke="#7E97B8"/><text x="880" y="272">595 #9</text>
    <rect x="932" y="245" width="60" height="44" rx="4" fill="#E7EEF7" stroke="#7E97B8"/><text x="962" y="272">595 #10</text>
    <rect x="1014" y="245" width="60" height="44" rx="4" fill="#E7EEF7" stroke="#7E97B8"/><text x="1044" y="272">595 #11</text>
  </g>

  <!-- DS cascade arrows -->
  <g stroke="#7A4FB0" stroke-width="2" marker-end="url(#arrG)">
    <line x1="140" y1="267" x2="160" y2="267"/>
    <line x1="222" y1="267" x2="242" y2="267"/>
    <line x1="304" y1="267" x2="324" y2="267"/>
    <line x1="525" y1="267" x2="545" y2="267"/>
    <line x1="607" y1="267" x2="627" y2="267"/>
    <line x1="689" y1="267" x2="709" y2="267"/>
    <line x1="910" y1="267" x2="930" y2="267"/>
    <line x1="992" y1="267" x2="1012" y2="267"/>
  </g>
  <line x1="44" y1="267" x2="78" y2="267" stroke="#2D6CDF" stroke-width="2" marker-end="url(#arr)"/>
  <text x="30" y="255" font-size="9" fill="#2D6CDF">D11</text>
  <path d="M386 258 C 410 224, 441 224, 463 258" fill="none" stroke="#7A4FB0" stroke-width="2.5" marker-end="url(#arrG)"/>
  <path d="M771 258 C 795 224, 826 224, 848 258" fill="none" stroke="#7A4FB0" stroke-width="2.5" marker-end="url(#arrG)"/>
  <text x="600" y="306" font-size="9.5" fill="#7A4FB0" text-anchor="middle">DS daisy-chain through all 11: each 595 Q7′(9) → next 595 DS(14), crossing each seam once</text>

  <!-- ULN ROW -->
  <g font-size="11" fill="#2A2A2A" text-anchor="middle">
    <rect x="80" y="404" width="60" height="44" rx="4" fill="#F3ECE0" stroke="#B8A27E"/><text x="110" y="431">ULN #1</text>
    <rect x="162" y="404" width="60" height="44" rx="4" fill="#F3ECE0" stroke="#B8A27E"/><text x="192" y="431">ULN #2</text>
    <rect x="244" y="404" width="60" height="44" rx="4" fill="#F3ECE0" stroke="#B8A27E"/><text x="274" y="431">ULN #3</text>
    <rect x="326" y="404" width="60" height="44" rx="4" fill="#F3ECE0" stroke="#B8A27E"/><text x="356" y="431">ULN #4</text>
    <rect x="465" y="404" width="60" height="44" rx="4" fill="#F3ECE0" stroke="#B8A27E"/><text x="495" y="431">ULN #5</text>
    <rect x="547" y="404" width="60" height="44" rx="4" fill="#F3ECE0" stroke="#B8A27E"/><text x="577" y="431">ULN #6</text>
    <rect x="629" y="404" width="60" height="44" rx="4" fill="#F3ECE0" stroke="#B8A27E"/><text x="659" y="431">ULN #7</text>
    <rect x="711" y="404" width="60" height="44" rx="4" fill="#F3ECE0" stroke="#B8A27E"/><text x="741" y="431">ULN #8</text>
    <rect x="850" y="404" width="60" height="44" rx="4" fill="#F3ECE0" stroke="#B8A27E"/><text x="880" y="431">ULN #9</text>
    <rect x="932" y="404" width="60" height="44" rx="4" fill="#F3ECE0" stroke="#B8A27E"/><text x="962" y="431">ULN #10</text>
    <rect x="1014" y="404" width="60" height="44" rx="4" fill="#F3ECE0" stroke="#B8A27E"/><text x="1044" y="431">ULN #11</text>
  </g>
  <!-- per-cell 8-jumper connectors -->
  <g stroke="#9AA0A6" stroke-width="6" opacity="0.55">
    <line x1="110" y1="291" x2="110" y2="402"/><line x1="192" y1="291" x2="192" y2="402"/>
    <line x1="274" y1="291" x2="274" y2="402"/><line x1="356" y1="291" x2="356" y2="402"/>
    <line x1="495" y1="291" x2="495" y2="402"/><line x1="577" y1="291" x2="577" y2="402"/>
    <line x1="659" y1="291" x2="659" y2="402"/><line x1="741" y1="291" x2="741" y2="402"/>
    <line x1="880" y1="291" x2="880" y2="402"/><line x1="962" y1="291" x2="962" y2="402"/>
    <line x1="1044" y1="291" x2="1044" y2="402"/>
  </g>
  <text x="392" y="368" font-size="9" fill="#777" text-anchor="middle">grey = Q0–Q7 → IN1–8 (×8 per cell)</text>

  <!-- reservoir caps -->
  <rect x="90" y="498" width="120" height="22" rx="3" fill="#FDE8CF" stroke="#E0A05A"/>
  <text x="150" y="513" font-size="9.5" fill="#8A4B12" text-anchor="middle">4700µF @ 12V input</text>
  <rect x="884" y="498" width="130" height="22" rx="3" fill="#FDE8CF" stroke="#E0A05A"/>
  <text x="949" y="513" font-size="9.5" fill="#8A4B12" text-anchor="middle">4700µF far-board bulk</text>
  <text x="620" y="513" font-size="9.5" fill="#8A6B12" text-anchor="middle" font-style="italic">Board B: no separate bulk (between A &amp; C on a continuous rail)</text>

  <!-- output header + channel labels -->
  <line x1="70" y1="540" x2="400" y2="540" stroke="#9AA8B4" stroke-width="2" stroke-dasharray="2 2"/>
  <line x1="455" y1="540" x2="785" y2="540" stroke="#9AA8B4" stroke-width="2" stroke-dasharray="2 2"/>
  <line x1="840" y1="540" x2="1170" y2="540" stroke="#9AA8B4" stroke-width="2" stroke-dasharray="2 2"/>
  <g font-size="8.5" fill="#444" text-anchor="middle">
    <text x="110" y="556">0–7</text><text x="192" y="556">8–15</text><text x="274" y="556">16–23</text><text x="356" y="556">24–31</text>
    <text x="495" y="556">32–39</text><text x="577" y="556">40–47</text><text x="659" y="556">48–55</text><text x="741" y="556">56–63</text>
    <text x="880" y="556">64–71</text><text x="962" y="556">72–79</text><text x="1044" y="556">80–87</text>
  </g>
  <text x="1044" y="585" font-size="8.5" fill="#B23B3B" text-anchor="middle">80–83 used · 84–87 spare</text>
  <text x="430" y="585" font-size="9" fill="#555" text-anchor="middle">88-pin output header → solenoids (each solenoid's other lead → +12V)</text>

  <!-- bottom notes -->
  <line x1="60" y1="610" x2="1180" y2="610" stroke="#E2E2E2"/>
  <text x="60" y="632" font-size="13" font-weight="700" fill="#1A1A1A">NOTES</text>
  <g font-size="11.5" fill="#333">
    <text x="60" y="654">• Three boards end-to-end = one line of 11 cells (the §6 floor plan, crossing 2 seams). Rails run straight across each board; bridge them at each seam.</text>
    <text x="60" y="674">• Split: A = cells 1–4 (ch 0–31), B = cells 5–8 (ch 32–63), C = cells 9–11 (ch 64–87). 4 cells ≈ 100 mm on a 150 mm board — comfortable, room for borders.</text>
    <text x="60" y="694">• Bulk caps (you own 2× 4700µF 25V): one at Board A's 12V input, one on Board C (far end). Board B sits between them — no separate bulk needed.</text>
    <text x="60" y="714">• One 0.1µF at EVERY chip (22 total): 595 across pins 16↔8, ULN across 10↔9. Legs short. (You have 0.1µF ceramic ×50+.)</text>
    <text x="60" y="734">• SH_CP/ST_CP shared by all 11 (tap every 595 pin 11 → green, pin 12 → white). Only chip #1's DS goes to the Mega; the rest daisy-chain through the seams.</text>
  </g>

  <!-- legend -->
  <g font-size="11" fill="#333">
    <rect x="60" y="752" width="18" height="11" fill="#E03B3B"/><text x="84" y="761">+5V</text>
    <rect x="140" y="752" width="18" height="11" fill="#F08A24"/><text x="164" y="761">+12V</text>
    <rect x="232" y="752" width="18" height="11" fill="#2A2A2A"/><text x="256" y="761">GND ★</text>
    <rect x="330" y="752" width="18" height="11" fill="#2EA84F"/><text x="354" y="761">SH_CP</text>
    <rect x="426" y="752" width="18" height="11" fill="#BBBBBB"/><text x="450" y="761">ST_CP</text>
    <rect x="518" y="752" width="18" height="11" fill="#2D6CDF"/><text x="542" y="761">DS (to Mega)</text>
    <rect x="648" y="752" width="18" height="11" fill="#7A4FB0"/><text x="672" y="761">DS cascade chain</text>
    <rect x="800" y="752" width="18" height="11" fill="#9AA0A6"/><text x="824" y="761">signal (Q→IN, OUT→solenoid)</text>
  </g>

  <!-- cardinal rules -->
  <rect x="60" y="786" width="1120" height="62" rx="6" fill="#FBF1F1" stroke="#E7C7C7"/>
  <text x="74" y="808" font-size="12" font-weight="700" fill="#B23B3B">CARDINAL RULES</text>
  <text x="74" y="827" font-size="11.5" fill="#7A3A3A">+5V and +12V share NO copper anywhere — the only tie between the 5V and 12V worlds is the GND rail at one star point. Carry +12V across each seam with heavy/doubled wire.</text>
  <text x="74" y="843" font-size="11.5" fill="#7A3A3A">Build &amp; continuity-test each board on its own, then bridge the seam jumpers. Power cold-check → 5V only → add 12V last.</text>
</svg>
