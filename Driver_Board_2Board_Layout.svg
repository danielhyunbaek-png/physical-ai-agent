<svg viewBox="0 0 1240 880" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#555"/></marker>
    <marker id="arrG" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#7A4FB0"/></marker>
  </defs>

  <rect x="0" y="0" width="1240" height="880" fill="#FFFFFF"/>

  <!-- title -->
  <text x="60" y="40" font-size="22" font-weight="700" fill="#1A1A1A">FULL DRIVER BOARD — 2 PERFBOARDS, END-TO-END (one line of 11 cells)</text>
  <text x="60" y="62" font-size="13" fill="#666">88 channels = 11 cells (1× 74HC595 + 1× ULN2803A each). 84 used (ch 0–83), 4 spare. Build &amp; test Board A fully, then Board B, then bridge the seam.</text>

  <!-- ===== Mega + PSU feed box (left) ===== -->
  <rect x="60" y="80" width="372" height="92" rx="6" fill="#F4F7FB" stroke="#C4D3E6"/>
  <text x="72" y="98" font-size="12" font-weight="700" fill="#234">ARDUINO MEGA + 12V PSU  →  feed Board A (left edge)</text>
  <g font-size="11" fill="#333">
    <text x="72" y="116">D11 → 595 #1 DS (blue)　　D12 → SH_CP rail (green)</text>
    <text x="72" y="132">D13 → ST_CP rail (white)　Mega GND → GND ★ (black)</text>
    <text x="72" y="148">+5V → +5V rail (red)　　　PSU +12V → +12V rail (orange)</text>
    <text x="72" y="164">PSU GND → GND ★ (one star point with Mega GND)</text>
  </g>

  <!-- ===== Seam jumpers box (right) ===== -->
  <rect x="820" y="80" width="360" height="92" rx="6" fill="#FBF5EE" stroke="#E6C9A8"/>
  <text x="832" y="98" font-size="12" font-weight="700" fill="#7a4a12">SEAM — 6 jumpers, Board A → Board B</text>
  <g font-size="11" fill="#333">
    <text x="832" y="116">1 +5V　　2 SH_CP　　3 ST_CP</text>
    <text x="832" y="132">4 GND (solid)　　5 +12V (heavy / doubled wire)</text>
    <text x="832" y="148">6 DS cascade: 595 #6 Q7′(pin9) → 595 #7 DS(pin14)</text>
    <text x="832" y="164" font-style="italic" fill="#7a4a12">Bridge these LAST, after both boards test good.</text>
  </g>

  <!-- ===== BOARDS ===== -->
  <rect x="60" y="190" width="540" height="378" rx="6" fill="#FCFCFA" stroke="#CFCFCF"/>
  <rect x="640" y="190" width="540" height="378" rx="6" fill="#FCFCFA" stroke="#CFCFCF"/>
  <text x="70" y="208" font-size="12" font-weight="700" fill="#555">BOARD A — cells 1–6  (channels 0–47)</text>
  <text x="650" y="208" font-size="12" font-weight="700" fill="#555">BOARD B — cells 7–11  (channels 48–87)</text>

  <!-- seam marker -->
  <rect x="600" y="190" width="40" height="378" fill="#FBEFE0"/>
  <text x="620" y="560" font-size="10" fill="#B07a2a" text-anchor="middle" transform="rotate(-90 620 560)">SEAM (board edges)</text>

  <!-- ===== RAILS (across each board) ===== -->
  <!-- helper y: +5V 230, SHcp 322, STcp 347, GND 384, +12V 488 -->
  <!-- +5V -->
  <line x1="70" y1="230" x2="595" y2="230" stroke="#E03B3B" stroke-width="3"/>
  <line x1="645" y1="230" x2="1170" y2="230" stroke="#E03B3B" stroke-width="3"/>
  <text x="70" y="224" font-size="10" font-weight="700" fill="#E03B3B">+5V</text>
  <!-- SH_CP -->
  <line x1="70" y1="322" x2="595" y2="322" stroke="#2EA84F" stroke-width="3"/>
  <line x1="645" y1="322" x2="1170" y2="322" stroke="#2EA84F" stroke-width="3"/>
  <text x="70" y="317" font-size="10" font-weight="700" fill="#2EA84F">SH_CP</text>
  <!-- ST_CP -->
  <line x1="70" y1="347" x2="595" y2="347" stroke="#BBBBBB" stroke-width="3"/>
  <line x1="645" y1="347" x2="1170" y2="347" stroke="#BBBBBB" stroke-width="3"/>
  <text x="70" y="342" font-size="10" font-weight="700" fill="#888">ST_CP</text>
  <!-- GND spine -->
  <line x1="70" y1="384" x2="595" y2="384" stroke="#2A2A2A" stroke-width="4"/>
  <line x1="645" y1="384" x2="1170" y2="384" stroke="#2A2A2A" stroke-width="4"/>
  <text x="70" y="378" font-size="10" font-weight="700" fill="#2A2A2A">GND ★</text>
  <!-- +12V -->
  <line x1="70" y1="488" x2="595" y2="488" stroke="#F08A24" stroke-width="5"/>
  <line x1="645" y1="488" x2="1170" y2="488" stroke="#F08A24" stroke-width="5"/>
  <text x="70" y="482" font-size="10" font-weight="700" fill="#D9760F">+12V</text>

  <!-- ===== SEAM rail jumpers ===== -->
  <g>
    <line x1="595" y1="230" x2="645" y2="230" stroke="#E03B3B" stroke-width="3" stroke-dasharray="4 3"/>
    <line x1="595" y1="322" x2="645" y2="322" stroke="#2EA84F" stroke-width="3" stroke-dasharray="4 3"/>
    <line x1="595" y1="347" x2="645" y2="347" stroke="#BBBBBB" stroke-width="3" stroke-dasharray="4 3"/>
    <line x1="595" y1="384" x2="645" y2="384" stroke="#2A2A2A" stroke-width="4" stroke-dasharray="4 3"/>
    <line x1="595" y1="488" x2="645" y2="488" stroke="#F08A24" stroke-width="5" stroke-dasharray="4 3"/>
  </g>

  <!-- ===== 595 ROW (blocks) ===== -->
  <!-- A centers: 95 177 259 341 423 505 ; B: 675 757 839 921 1003 -->
  <g font-size="11" fill="#2A2A2A" text-anchor="middle">
    <g>
      <rect x="64" y="245" width="62" height="44" rx="4" fill="#E7EEF7" stroke="#7E97B8"/><text x="95" y="272">595 #1</text>
      <rect x="146" y="245" width="62" height="44" rx="4" fill="#E7EEF7" stroke="#7E97B8"/><text x="177" y="272">595 #2</text>
      <rect x="228" y="245" width="62" height="44" rx="4" fill="#E7EEF7" stroke="#7E97B8"/><text x="259" y="272">595 #3</text>
      <rect x="310" y="245" width="62" height="44" rx="4" fill="#E7EEF7" stroke="#7E97B8"/><text x="341" y="272">595 #4</text>
      <rect x="392" y="245" width="62" height="44" rx="4" fill="#E7EEF7" stroke="#7E97B8"/><text x="423" y="272">595 #5</text>
      <rect x="474" y="245" width="62" height="44" rx="4" fill="#E7EEF7" stroke="#7E97B8"/><text x="505" y="272">595 #6</text>
      <rect x="644" y="245" width="62" height="44" rx="4" fill="#E7EEF7" stroke="#7E97B8"/><text x="675" y="272">595 #7</text>
      <rect x="726" y="245" width="62" height="44" rx="4" fill="#E7EEF7" stroke="#7E97B8"/><text x="757" y="272">595 #8</text>
      <rect x="808" y="245" width="62" height="44" rx="4" fill="#E7EEF7" stroke="#7E97B8"/><text x="839" y="272">595 #9</text>
      <rect x="890" y="245" width="62" height="44" rx="4" fill="#E7EEF7" stroke="#7E97B8"/><text x="921" y="272">595 #10</text>
      <rect x="972" y="245" width="62" height="44" rx="4" fill="#E7EEF7" stroke="#7E97B8"/><text x="1003" y="272">595 #11</text>
    </g>
  </g>

  <!-- DS cascade arrows along 595 row (y267) -->
  <g stroke="#7A4FB0" stroke-width="2" marker-end="url(#arrG)">
    <line x1="126" y1="267" x2="144" y2="267"/>
    <line x1="208" y1="267" x2="226" y2="267"/>
    <line x1="290" y1="267" x2="308" y2="267"/>
    <line x1="372" y1="267" x2="390" y2="267"/>
    <line x1="454" y1="267" x2="472" y2="267"/>
    <line x1="706" y1="267" x2="724" y2="267"/>
    <line x1="788" y1="267" x2="806" y2="267"/>
    <line x1="870" y1="267" x2="888" y2="267"/>
    <line x1="952" y1="267" x2="970" y2="267"/>
  </g>
  <!-- DS from Mega into #1 -->
  <line x1="40" y1="267" x2="62" y2="267" stroke="#2D6CDF" stroke-width="2" marker-end="url(#arr)"/>
  <text x="20" y="255" font-size="9" fill="#2D6CDF">D11</text>
  <!-- DS seam crossing #6 -> #7 -->
  <path d="M536 258 C 580 225, 660 225, 644 258" fill="none" stroke="#7A4FB0" stroke-width="2.5" marker-end="url(#arrG)"/>
  <text x="590" y="222" font-size="9" font-weight="700" fill="#7A4FB0" text-anchor="middle">DS cascade across seam</text>
  <text x="300" y="305" font-size="9.5" fill="#7A4FB0" text-anchor="middle">DS daisy-chain: each 595 Q7′(9) → next 595 DS(14)</text>

  <!-- ===== ULN ROW (blocks) ===== -->
  <g font-size="11" fill="#2A2A2A" text-anchor="middle">
    <rect x="64" y="404" width="62" height="44" rx="4" fill="#F3ECE0" stroke="#B8A27E"/><text x="95" y="431">ULN #1</text>
    <rect x="146" y="404" width="62" height="44" rx="4" fill="#F3ECE0" stroke="#B8A27E"/><text x="177" y="431">ULN #2</text>
    <rect x="228" y="404" width="62" height="44" rx="4" fill="#F3ECE0" stroke="#B8A27E"/><text x="259" y="431">ULN #3</text>
    <rect x="310" y="404" width="62" height="44" rx="4" fill="#F3ECE0" stroke="#B8A27E"/><text x="341" y="431">ULN #4</text>
    <rect x="392" y="404" width="62" height="44" rx="4" fill="#F3ECE0" stroke="#B8A27E"/><text x="423" y="431">ULN #5</text>
    <rect x="474" y="404" width="62" height="44" rx="4" fill="#F3ECE0" stroke="#B8A27E"/><text x="505" y="431">ULN #6</text>
    <rect x="644" y="404" width="62" height="44" rx="4" fill="#F3ECE0" stroke="#B8A27E"/><text x="675" y="431">ULN #7</text>
    <rect x="726" y="404" width="62" height="44" rx="4" fill="#F3ECE0" stroke="#B8A27E"/><text x="757" y="431">ULN #8</text>
    <rect x="808" y="404" width="62" height="44" rx="4" fill="#F3ECE0" stroke="#B8A27E"/><text x="839" y="431">ULN #9</text>
    <rect x="890" y="404" width="62" height="44" rx="4" fill="#F3ECE0" stroke="#B8A27E"/><text x="921" y="431">ULN #10</text>
    <rect x="972" y="404" width="62" height="44" rx="4" fill="#F3ECE0" stroke="#B8A27E"/><text x="1003" y="431">ULN #11</text>
  </g>
  <!-- per-cell 595->ULN 8-jumper connectors -->
  <g stroke="#9AA0A6" stroke-width="6" opacity="0.55">
    <line x1="95" y1="291" x2="95" y2="402"/><line x1="177" y1="291" x2="177" y2="402"/>
    <line x1="259" y1="291" x2="259" y2="402"/><line x1="341" y1="291" x2="341" y2="402"/>
    <line x1="423" y1="291" x2="423" y2="402"/><line x1="505" y1="291" x2="505" y2="402"/>
    <line x1="675" y1="291" x2="675" y2="402"/><line x1="757" y1="291" x2="757" y2="402"/>
    <line x1="839" y1="291" x2="839" y2="402"/><line x1="921" y1="291" x2="921" y2="402"/>
    <line x1="1003" y1="291" x2="1003" y2="402"/>
  </g>
  <text x="540" y="360" font-size="9" fill="#777">grey = Q0–Q7 → IN1–8 (×8 per cell)</text>

  <!-- reservoir caps on +12V -->
  <rect x="150" y="498" width="120" height="22" rx="3" fill="#FDE8CF" stroke="#E0A05A"/>
  <text x="210" y="513" font-size="9.5" fill="#8A4B12" text-anchor="middle">4700µF @ 12V input</text>
  <rect x="700" y="498" width="150" height="22" rx="3" fill="#FDE8CF" stroke="#E0A05A"/>
  <text x="775" y="513" font-size="9.5" fill="#8A4B12" text-anchor="middle">1000µF local bulk (after seam)</text>

  <!-- output header + channel labels -->
  <line x1="70" y1="540" x2="595" y2="540" stroke="#9AA8B4" stroke-width="2" stroke-dasharray="2 2"/>
  <line x1="645" y1="540" x2="1170" y2="540" stroke="#9AA8B4" stroke-width="2" stroke-dasharray="2 2"/>
  <g font-size="8.5" fill="#444" text-anchor="middle">
    <text x="95" y="556">0–7</text><text x="177" y="556">8–15</text><text x="259" y="556">16–23</text>
    <text x="341" y="556">24–31</text><text x="423" y="556">32–39</text><text x="505" y="556">40–47</text>
    <text x="675" y="556">48–55</text><text x="757" y="556">56–63</text><text x="839" y="556">64–71</text>
    <text x="921" y="556">72–79</text><text x="1003" y="556">80–87</text>
  </g>
  <text x="1003" y="585" font-size="8.5" fill="#B23B3B" text-anchor="middle">80–83 used · 84–87 spare</text>
  <text x="333" y="585" font-size="9" fill="#555" text-anchor="middle">88-pin output header → solenoids (each solenoid's other lead → +12V)</text>

  <!-- ===== bottom notes ===== -->
  <line x1="60" y1="610" x2="1180" y2="610" stroke="#E2E2E2"/>
  <text x="60" y="632" font-size="13" font-weight="700" fill="#1A1A1A">NOTES</text>
  <g font-size="11.5" fill="#333">
    <text x="60" y="654">• Boards sit end-to-end so all 11 cells form ONE line — the §6 floor plan, just crossing a seam. Rails run straight across both.</text>
    <text x="60" y="674">• Split: Board A = cells 1–6 (48 ch), Board B = cells 7–11 (40 ch). At ~25 mm cell pitch, 6 fit a 150 mm board; trim spare space on B.</text>
    <text x="60" y="694">• One 0.1µF decoupling cap at EVERY chip (22 total): 595 across pins 16↔8, ULN across 10↔9. Legs short.</text>
    <text x="60" y="714">• SH_CP and ST_CP are shared by all 11 — tap every 595 pin 11 → green rail, every pin 12 → white rail. Only chip #1's DS goes to the Mega.</text>
    <text x="60" y="734">• Test each cell as you finish its column (continuity), per Soldering_Plan §10/§11. Then walk-mode all 84 with one roving test solenoid.</text>
  </g>

  <!-- legend -->
  <g font-size="11" fill="#333">
    <rect x="60" y="752" width="18" height="11" fill="#E03B3B"/><text x="84" y="761">+5V</text>
    <rect x="140" y="752" width="18" height="11" fill="#F08A24"/><text x="164" y="761">+12V</text>
    <rect x="232" y="752" width="18" height="11" fill="#2A2A2A"/><text x="256" y="761">GND ★</text>
    <rect x="330" y="752" width="18" height="11" fill="#2EA84F"/><text x="354" y="761">SH_CP</text>
    <rect x="426" y="752" width="18" height="11" fill="#BBBBBB"/><text x="450" y="761">ST_CP</text>
    <rect x="518" y="752" width="18" height="11" fill="#2D6CDF"/><text x="542" y="761">DS (to Mega)</text>
    <rect x="648" y="752" width="18" height="11" fill="#7A4FB0"/><text x="672" y="761">DS cascade chain</text>
    <rect x="800" y="752" width="18" height="11" fill="#9AA0A6"/><text x="824" y="761">signal (Q→IN, OUT→solenoid)</text>
  </g>

  <!-- cardinal rule -->
  <rect x="60" y="786" width="1120" height="62" rx="6" fill="#FBF1F1" stroke="#E7C7C7"/>
  <text x="74" y="808" font-size="12" font-weight="700" fill="#B23B3B">CARDINAL RULES</text>
  <text x="74" y="827" font-size="11.5" fill="#7A3A3A">+5V and +12V share NO copper anywhere — the only tie between the 5V and 12V worlds is the GND rail at one star point. Carry +12V across the seam with heavy/doubled wire.</text>
  <text x="74" y="843" font-size="11.5" fill="#7A3A3A">Build &amp; continuity-test Board A on its own, then Board B, then bridge the 6 seam jumpers. Power cold-check → 5V only → add 12V last.</text>
</svg>
