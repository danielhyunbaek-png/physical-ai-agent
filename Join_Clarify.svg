<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="Helvetica,Arial"><rect width="1180" height="720" fill="#ffffff"/>
<text x="40" y="40" font-size="26" fill="#1a202c" text-anchor="start" font-weight="bold" font-family="Helvetica,Arial">Join you described — please confirm the cross-section</text>
<text x="40" y="66" font-size="16" fill="#4a5568" text-anchor="start" font-weight="normal" font-family="Helvetica,Arial">Horizontal screw across the seam · counterbore on the right · nut trapped on the left</text>
<text x="720" y="108" font-size="14" fill="#2b6cb0" text-anchor="start" font-weight="bold" font-family="Helvetica,Arial">TOP VIEW (one tab, at back edge)</text>
<rect x="720" y="120" width="150" height="150" fill="#cfe3f7" stroke="#2b6cb0"/>
<rect x="870" y="120" width="150" height="150" fill="#fde2cf" stroke="#c05621"/>
<text x="795" y="200" font-size="13" fill="#2b6cb0" text-anchor="middle" font-weight="normal" font-family="Helvetica,Arial">LEFT</text>
<text x="945" y="200" font-size="13" fill="#c05621" text-anchor="middle" font-weight="normal" font-family="Helvetica,Arial">RIGHT</text>
<rect x="830" y="50" width="80" height="70" fill="#e2e8f0" stroke="#333"/>
<text x="870" y="42" font-size="12" fill="#333" text-anchor="middle" font-weight="normal" font-family="Helvetica,Arial">tab (past edge)</text>
<line x1="905" y1="70" x2="845" y2="70" stroke="#e53e3e" stroke-width="3" marker-end="url(#ar)"/>
<circle cx="840" cy="70" r="6" fill="none" stroke="#1a202c" stroke-width="2"/>
<line x1="905" y1="100" x2="845" y2="100" stroke="#e53e3e" stroke-width="3" marker-end="url(#ar)"/>
<circle cx="840" cy="100" r="6" fill="none" stroke="#1a202c" stroke-width="2"/>
<text x="870" y="295" font-size="12" fill="#333" text-anchor="middle" font-weight="normal" font-family="Helvetica,Arial">2 screws → into nuts (⬡)</text>
<text x="70" y="138" font-size="15" fill="#2b6cb0" text-anchor="start" font-weight="bold" font-family="Helvetica,Arial">CROSS-SECTION through one screw (looking along the back edge)</text>
<rect x="100" y="150" width="120" height="80" fill="#cfe3f7" stroke="#2b6cb0" stroke-width="1.5"/>
<rect x="220" y="150" width="40" height="80" fill="#fde2cf" stroke="#c05621" stroke-width="1.5"/>
<line x1="220" y1="150" x2="220" y2="230" stroke="#e53e3e" stroke-width="2" stroke-dasharray="5,4"/>
<text x="222" y="146" font-size="12" fill="#e53e3e" text-anchor="start" font-weight="normal" font-family="Helvetica,Arial">seam</text>
<rect x="240" y="155.0" width="20" height="70" fill="#cbd5e0" stroke="#718096"/>
<text x="250" y="151.0" font-size="11" fill="#4a5568" text-anchor="middle" font-weight="normal" font-family="Helvetica,Arial">Ø7 cbore</text>
<rect x="220" y="173.0" width="20" height="34.0" fill="#ffffff" stroke="#718096"/>
<rect x="160" y="180.0" width="60" height="20.0" fill="#a0aec0" stroke="#4a5568"/>
<rect x="155.0" y="162.0" width="30" height="56.0" fill="none" stroke="#1a202c" stroke-width="2"/>
<text x="170" y="158.0" font-size="11" fill="#1a202c" text-anchor="middle" font-weight="normal" font-family="Helvetica,Arial">M3 nut</text>
<rect x="160.0" y="150" width="26.0" height="40.0" fill="#edf2f7" stroke="#718096" stroke-dasharray="3,3"/>
<text x="173.0" y="148" font-size="11" fill="#718096" text-anchor="start" font-weight="normal" font-family="Helvetica,Arial">drop nut in from top</text>
<rect x="260" y="165.0" width="10" height="50" fill="#2d3748"/>
<text x="274.0" y="190" font-size="12" fill="#2d3748" text-anchor="start" font-weight="normal" font-family="Helvetica,Arial">← screw head (5×3mm, 1mm proud)</text>
<text x="90" y="250.0" font-size="12" fill="#2b6cb0" text-anchor="start" font-weight="normal" font-family="Helvetica,Arial">left tab</text>
<text x="230" y="250.0" font-size="12" fill="#c05621" text-anchor="start" font-weight="normal" font-family="Helvetica,Arial">right tab ~4mm</text>
<text x="70" y="276.0" font-size="13" fill="#4a5568" text-anchor="start" font-weight="normal" font-family="Helvetica,Arial">Tab stands 8mm tall (Z0–8) so the Ø7 counterbore fits on the vertical face.</text>
<text x="70" y="296.0" font-size="13" fill="#4a5568" text-anchor="start" font-weight="normal" font-family="Helvetica,Arial">Screw enters from the right, crosses the seam, threads into the captive nut on the left.</text>
<text x="40" y="560" font-size="16" fill="#1a202c" text-anchor="start" font-weight="bold" font-family="Helvetica,Arial">Confirm before I build:</text>
<text x="40" y="586" font-size="14" fill="#2d3748" text-anchor="start" font-weight="normal" font-family="Helvetica,Arial">1.  Tab ~8mm tall in Z (a small block, thin in depth) so the Ø7 cbore fits — OK?</text>
<text x="40" y="610" font-size="14" fill="#2d3748" text-anchor="start" font-weight="normal" font-family="Helvetica,Arial">2.  Insert the nut from the TOP (a slot down to the screw hole) — or from the seam face?</text>
<text x="40" y="634" font-size="14" fill="#2d3748" text-anchor="start" font-weight="normal" font-family="Helvetica,Arial">3.  The 2 screws per tab sit side-by-side along the edge — OK? (4 screws total: 2 back, 2 front)</text>
<defs><marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#e53e3e"/></marker></defs>
</svg>